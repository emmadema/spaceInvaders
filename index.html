<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sloth Squadron</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 12px;
    }

    canvas {
      border: 2px solid #33ff33;
      display: block;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #shieldToggle {
      background: #000;
      color: #33ff33;
      border: 2px solid #33ff33;
      font-family: monospace;
      font-size: 14px;
      padding: 6px 16px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    #shieldToggle:hover {
      background: #33ff33;
      color: #000;
    }

    #shieldLabel {
      color: #aaaaaa;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="controls">
    <span id="shieldLabel">Shields:</span>
    <button id="shieldToggle">ON</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
